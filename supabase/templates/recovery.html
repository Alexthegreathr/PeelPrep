<h2>Reset your PeelPrep password</h2>

<p>We received a request to reset the password for your PeelPrep account.</p>

<p>
  <a
    href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=recovery&next=%2Fupdate-password"
    >Choose a new password</a
  >
</p>

<p>
  If you didn&rsquo;t request a password reset, you can safely ignore this email
  — your password will not change.
</p>
