# PeelPrep local Supabase configuration.
# Hand-authored for Phase 2 (equivalent to `supabase init` output, trimmed to
# the settings we rely on). Run `supabase start` from the repo root.

project_id = "peelprep"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Local email testing server (captures every outbound email).
# Open http://127.0.0.1:54324 to read confirmation / recovery emails.
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
# Auth email links must resolve to whichever local dev origin/port is actually
# serving the app (localhost or 127.0.0.1, :3000 or the :3001 fallback), so a
# link is never sent to an inactive port. Supabase only honors redirect targets
# on this allowlist; src/lib/auth/site-url.ts picks the matching active origin.
# Production overrides site_url + these URLs with the deployed domain.
additional_redirect_urls = [
  "http://localhost:3000/**",
  "http://localhost:3001/**",
  "http://127.0.0.1:3000/**",
  "http://127.0.0.1:3001/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
# Public demo: each visitor gets their own isolated sandbox via an anonymous
# session (enable the same toggle in the hosted project's auth settings).
enable_anonymous_sign_ins = true
minimum_password_length = 8

[auth.rate_limit]
# Supabase's own auth rate limits stay on (SECURITY.md §1) in addition to
# the application-level hit_rate_limit() function.
email_sent = 10
sign_in_sign_ups = 30
token_verifications = 30

[auth.email]
enable_signup = true
double_confirm_changes = true
# Email verification is REQUIRED before login (SECURITY.md §1).
enable_confirmations = true
max_frequency = "1m"

# Custom templates link to our /auth/confirm route handler with a token_hash,
# which verifies via verifyOtp() server-side (ROUTES.md §2).
[auth.email.template.confirmation]
subject = "Confirm your PeelPrep account"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your PeelPrep password"
content_path = "./supabase/templates/recovery.html"
